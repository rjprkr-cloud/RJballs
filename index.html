<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spherocide</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Name-entry screen — shown before the game loads, hidden once a name is submitted -->
<div id="name-screen">
  <div id="name-box">
    <div id="name-title">SPHEROCIDE</div>
    <div id="name-sub">Enter your name to join</div>
    <input id="name-input" type="text" maxlength="20" placeholder="Your name…" autocomplete="off" spellcheck="false" />
    <button id="name-btn">ENTER THE ARENA</button>
  </div>
</div>

<div id="hud">
  <div id="username">loading…</div>
  <div id="hint">WASD to move · mouse to aim · click or SPACE to shoot · portals to travel</div>
</div>
<canvas id="game" width="1920" height="1080"></canvas>
<script src="portal.js"></script>
<script type="module" src="game.js"></script>
</body>
</html>
